name: Build Android APK

# Web（client/）を Vite でビルド → Capacitor で android/ に同期 → Gradle で APK を生成し、
# ダウンロード可能な成果物（Artifact）としてアップロードする。
# タグ（v* ）を push した場合は GitHub Release にも APK を添付する。

on:
  # 任意のタイミングで GitHub の画面から手動実行できる（Actions ▸ このワークフロー ▸ Run workflow）
  workflow_dispatch:
  # ブランチへの push 時に自動ビルド
  push:
    branches:
      - main
      - 'claude/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write   # タグ push 時に Release を作成・アップロードするために必要

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web & sync Capacitor
        run: npm run build:android   # = vite build && cap sync android

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: coffee-46-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
